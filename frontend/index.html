<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeCraft - Node Hierarchy Analyzer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>EdgeCraft</h1>
      <p>Hierarchical Node Relationship Analyzer</p>
    </header>

    <main>
      <section class="input-section">
        <h2>Enter Your Details</h2>
        <div class="user-inputs">
          <div class="input-group">
            <label for="userId">User ID</label>
            <input type="text" id="userId" placeholder="john_doe_17091999" required>
          </div>
          <div class="input-group">
            <label for="emailId">Email</label>
            <input type="email" id="emailId" placeholder="john@xyz.com" required>
          </div>
          <div class="input-group">
            <label for="rollNumber">College Roll Number</label>
            <input type="text" id="rollNumber" placeholder="12345678" required>
          </div>
        </div>

        <h2>Input Node Relationships</h2>
        <p class="hint">Enter one relationship per line (e.g., A->B, A->C, B->D)</p>
        <textarea
          id="nodeInput"
          placeholder="A->B
A->C
B->D
C->E"
          rows="10"
        ></textarea>
        <button id="submitBtn">Analyze Hierarchy</button>
      </section>

      <section id="resultSection" class="result-section hidden">
        <h2>Analysis Result</h2>
        <div id="resultDisplay"></div>
      </section>

      <section id="errorSection" class="error-section hidden">
        <h2>Error</h2>
        <div id="errorMessage"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
